services:
  api:
    build: .
    user: root
    ports:
      - "${PORT}:8080"
    volumes:
      - /home/arsen/missile-prefictor:/app/data
    environment:
      - Telegram__ApiId=${TELEGRAM_API_ID}
      - Telegram__ApiHash=${TELEGRAM_API_HASH}
      - Telegram__Channel=${TELEGRAM_CHANNEL}
      - Telegram__PhoneNumber=${TELEGRAM_PHONE}
      - Google__SpreadsheetId=${GOOGLE_SPREADSHEET_ID}
      - Google__Range=${GOOGLE_RANGE}
      - Google__CredentialsFilePath=/app/data/credentials.json